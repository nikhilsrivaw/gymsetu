# GymSetu edge-function secrets for self-hosted Supabase.
# Copy this file into  supabase/docker/  (next to docker-compose.yml).
# docker compose automatically merges docker-compose.override.yml.
#
# NOTE: confirm the edge-functions service name with `docker compose ps`.
# In current Supabase self-host it is `functions` (image supabase/edge-runtime).
# If yours differs, rename the key below to match.
#
# Add the actual values to supabase/docker/.env (see .env.gymsetu.example).
services:
  functions:
    environment:
      # --- app functions (ai-assistant, send-whatsapp) ---
      GROQ_API_KEY: ${GROQ_API_KEY}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      # --- website functions (payu-initiate, payu-callback) ---
      PAYU_MERCHANT_KEY: ${PAYU_MERCHANT_KEY}
      PAYU_SALT: ${PAYU_SALT}
      PAYU_MODE: ${PAYU_MODE}
      APP_URL: ${APP_URL}
      # --- website AI (Gemini) ---
      GEMINI_API_KEY: ${GEMINI_API_KEY}
